spring:
  application:
    name: payment-command-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_command}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app:
  resilience:
    grpc:
      timeout-ms: ${GRPC_TIMEOUT_MS:700}
      max-attempts: ${GRPC_MAX_ATTEMPTS:3}
      wait-duration-ms: ${GRPC_WAIT_DURATION_MS:150}
      failure-rate-threshold: ${GRPC_CB_FAILURE_RATE_THRESHOLD:50}
      sliding-window-size: ${GRPC_CB_SLIDING_WINDOW_SIZE:20}
      minimum-number-of-calls: ${GRPC_CB_MIN_CALLS:10}
      permitted-calls-in-half-open-state: ${GRPC_CB_HALF_OPEN_CALLS:3}
      max-concurrent-calls: ${GRPC_BULKHEAD_MAX_CONCURRENT_CALLS:25}
  grpc:
    fraud:
      target: ${FRAUD_GRPC_TARGET:localhost:9091}
    limit:
      target: ${LIMIT_GRPC_TARGET:localhost:9094}
  outbox:
    relay:
      enabled: ${OUTBOX_RELAY_ENABLED:true}
      batch-size: ${OUTBOX_RELAY_BATCH_SIZE:50}
      max-retries: ${OUTBOX_RELAY_MAX_RETRIES:6}
      poll-delay-ms: ${OUTBOX_RELAY_POLL_DELAY_MS:2000}
      base-backoff-ms: ${OUTBOX_RELAY_BASE_BACKOFF_MS:1000}
      publish-timeout-ms: ${OUTBOX_RELAY_PUBLISH_TIMEOUT_MS:1200}
      topic: ${PAYMENT_EVENTS_TOPIC:payment.domain.events}
  payment-saga:
    max-attempts: ${PAYMENT_SAGA_MAX_ATTEMPTS:3}
    recovery-batch-size: ${PAYMENT_SAGA_RECOVERY_BATCH_SIZE:20}
    recovery-poll-delay-ms: ${PAYMENT_SAGA_RECOVERY_POLL_DELAY_MS:5000}
    recovery-stuck-after-ms: ${PAYMENT_SAGA_RECOVERY_STUCK_AFTER_MS:30000}
server:
  port: 8081
logging:
  file:
    name: ${LOG_FILE:logs/payment-command-service.log}
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
