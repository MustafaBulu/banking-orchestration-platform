spring:
  application:
    name: payment-command-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_command}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
app:
  outbox:
    relay:
      enabled: ${OUTBOX_RELAY_ENABLED:true}
      batch-size: ${OUTBOX_RELAY_BATCH_SIZE:50}
      max-retries: ${OUTBOX_RELAY_MAX_RETRIES:6}
      poll-delay-ms: ${OUTBOX_RELAY_POLL_DELAY_MS:2000}
      base-backoff-ms: ${OUTBOX_RELAY_BASE_BACKOFF_MS:1000}
      topic: ${PAYMENT_EVENTS_TOPIC:payment.domain.events}
server:
  port: 8081
