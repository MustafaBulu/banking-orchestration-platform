spring:
  application:
    name: payment-api-gateway
app:
  gateway:
    command-base-url: ${COMMAND_SERVICE_BASE_URL:http://localhost:8081}
    query-base-url: ${QUERY_SERVICE_BASE_URL:http://localhost:8082}
    timeout-ms: ${GATEWAY_TIMEOUT_MS:1200}
    rate-limit-per-minute: ${GATEWAY_RATE_LIMIT_PER_MINUTE:120}
server:
  port: 8080
logging:
  file:
    name: ${LOG_FILE:logs/payment-api-gateway.log}
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
