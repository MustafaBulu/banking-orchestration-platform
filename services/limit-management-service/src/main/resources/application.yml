spring:
  application:
    name: limit-management-service
  datasource:
    url: ${LIMIT_DB_URL:jdbc:postgresql://localhost:5432/payment_limit}
    username: ${LIMIT_DB_USERNAME:postgres}
    password: ${LIMIT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
app:
  grpc:
    port: ${LIMIT_GRPC_PORT:9094}
  limit:
    reservations:
      per-payment-limit: ${LIMIT_PER_PAYMENT_LIMIT:5000}
      lease-ttl-ms: ${LIMIT_RESERVATION_LEASE_TTL_MS:900000}
      reaper-delay-ms: ${LIMIT_RESERVATION_REAPER_DELAY_MS:5000}
server:
  port: 8085
logging:
  file:
    name: ${LOG_FILE:logs/limit-management-service.log}
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
