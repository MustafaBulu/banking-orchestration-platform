spring:
  application:
    name: payment-query-service
  datasource:
    url: ${QUERY_DB_URL:jdbc:postgresql://localhost:5432/payment_query}
    username: ${QUERY_DB_USERNAME:postgres}
    password: ${QUERY_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${PAYMENT_QUERY_CONSUMER_GROUP:payment-query-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
app:
  payment-events:
    topic: ${PAYMENT_EVENTS_TOPIC:payment.domain.events}
server:
  port: 8082
logging:
  file:
    name: ${LOG_FILE:logs/payment-query-service.log}
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
