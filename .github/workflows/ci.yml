name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-package:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvn -B clean package

      - name: Validate Docker Compose configuration
        run: docker compose -f platform/docker/docker-compose.yml config --quiet

      - name: Build service container images
        run: |
          docker build -f services/payment-api-gateway/Dockerfile -t payment-api-gateway:ci services/payment-api-gateway
          docker build -f services/payment-command-service/Dockerfile -t payment-command-service:ci services/payment-command-service
          docker build -f services/payment-query-service/Dockerfile -t payment-query-service:ci services/payment-query-service
          docker build -f services/fraud-detection-service/Dockerfile -t fraud-detection-service:ci services/fraud-detection-service
          docker build -f services/limit-management-service/Dockerfile -t limit-management-service:ci services/limit-management-service
          docker build -f services/ledger-service/Dockerfile -t ledger-service:ci services/ledger-service
          docker build -f services/notification-service/Dockerfile -t notification-service:ci services/notification-service

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: kubectl kustomize platform/kubernetes/base > /tmp/payment-platform-kubernetes.yaml
