global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: payment-platform-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payment-api-gateway:8080"]
        labels:
          service: payment-api-gateway
      - targets: ["payment-command-service:8081"]
        labels:
          service: payment-command-service
      - targets: ["payment-query-service:8082"]
        labels:
          service: payment-query-service
      - targets: ["fraud-detection-service:8083"]
        labels:
          service: fraud-detection-service
      - targets: ["ledger-service:8084"]
        labels:
          service: ledger-service
      - targets: ["limit-management-service:8085"]
        labels:
          service: limit-management-service
      - targets: ["notification-service:8086"]
        labels:
          service: notification-service
