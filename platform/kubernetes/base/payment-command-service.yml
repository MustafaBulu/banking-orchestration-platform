apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-command-service
  labels:
    app: payment-command-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-command-service
  template:
    metadata:
      labels:
        app: payment-command-service
    spec:
      containers:
        - name: payment-command-service
          image: banking-orchestration-platform/payment-command-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: payment-platform-config
            - secretRef:
                name: payment-platform-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-command-service
  labels:
    app: payment-command-service
spec:
  selector:
    app: payment-command-service
  ports:
    - name: http
      port: 8081
      targetPort: http
