apiVersion: apps/v1
kind: Deployment
metadata:
  name: limit-management-service
  labels:
    app: limit-management-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: limit-management-service
  template:
    metadata:
      labels:
        app: limit-management-service
    spec:
      containers:
        - name: limit-management-service
          image: banking-orchestration-platform/limit-management-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
            - name: grpc
              containerPort: 9094
          envFrom:
            - configMapRef:
                name: payment-platform-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: limit-management-service
  labels:
    app: limit-management-service
spec:
  selector:
    app: limit-management-service
  ports:
    - name: http
      port: 8085
      targetPort: http
    - name: grpc
      port: 9094
      targetPort: grpc
